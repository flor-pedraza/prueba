<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero GCBA</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f4f7;
color:#0f3557;
}

header{
background:linear-gradient(90deg,#ffd100 55%, #0f3557 55%);
padding:25px;
font-size:30px;
font-weight:bold;
}

header span{
display:block;
font-size:14px;
margin-top:8px;
}

.container{padding:20px;}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
padding:12px 20px;
background:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.tab.active{
background:#0f3557;
color:white;
}

.section{display:none;}
.section.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card,.box{
background:white;
border-radius:14px;
padding:18px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:20px;
}

.card h3{
margin:0;
font-size:14px;
color:#666;
}

.card p{
font-size:30px;
margin:10px 0 0;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#0f3557;
color:white;
padding:10px;
text-align:left;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#fff8d6;
}

select,input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-right:10px;
}
</style>
</head>

<body>

<header>
TABLERO OPERATIVO GCBA
<span id="fecha"></span>
</header>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="mostrar('ejecutivo',this)">Ejecutivo</div>
<div class="tab" onclick="mostrar('operativo',this)">Operativo</div>
</div>

<!-- EJECUTIVO -->
<div id="ejecutivo" class="section active">

<div class="grid">
<div class="card"><h3>Total Casos</h3><p id="total"></p></div>
<div class="card"><h3>Comunas</h3><p id="comunas"></p></div>
<div class="card"><h3>Edad Promedio</h3><p id="edad"></p></div>
<div class="card"><h3>Prioridad Alta</h3><p id="alta"></p></div>
</div>

<div class="box">
<canvas id="grafico1"></canvas>
</div>

</div>

<!-- OPERATIVO -->
<div id="operativo" class="section">

<div class="box">
<label>Filtrar comuna:</label>
<select id="filtro"></select>

<input type="text" id="buscar" placeholder="Buscar...">
</div>

<div class="box" style="overflow:auto; max-height:500px;">
<table id="tabla"></table>
</div>

</div>

</div>

<script>
let datosGlobal=[];
let chart1;

document.getElementById("fecha").innerText =
"Actualizado: " + new Date().toLocaleString("es-AR");

function mostrar(id,el){

document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));

document.getElementById(id).classList.add("active");
el.classList.add("active");
}

Papa.parse("datos.csv",{
download:true,
header:true,
complete:function(results){

datosGlobal=results.data.filter(x=>x["Id Suceso"]);
iniciar(datosGlobal);

}
});

function iniciar(data){

document.getElementById("total").innerText=data.length;

let comunas=[...new Set(data.map(x=>x["Comuna"]).filter(Boolean))];
document.getElementById("comunas").innerText=comunas.length;

let edades=data.map(x=>parseFloat(x["Persona Edad"])).filter(x=>!isNaN(x));
let prom=edades.reduce((a,b)=>a+b,0)/edades.length;
document.getElementById("edad").innerText=prom.toFixed(1);

document.getElementById("alta").innerText=
data.filter(x=>x["Prioridad"]=="Alta").length;

let select=document.getElementById("filtro");
select.innerHTML="<option value=''>Todas</option>";

comunas.forEach(c=>{
select.innerHTML+=`<option value="${c}">${c}</option>`;
});

select.onchange=filtrar;
document.getElementById("buscar").onkeyup=filtrar;

grafico(data);
tabla(data);
}

function grafico(data){

let conteo={};

data.forEach(x=>{
let c=x["Comuna"] || "Sin dato";
conteo[c]=(conteo[c]||0)+1;
});

if(chart1) chart1.destroy();

chart1=new Chart(document.getElementById("grafico1"),{
type:"bar",
data:{
labels:Object.keys(conteo),
datasets:[{
label:"Casos por comuna",
data:Object.values(conteo),
backgroundColor:"#ffd100"
}]
}
});
}

function tabla(data){

let cols=[
"Id Suceso","Agencia","Comuna","Prioridad",
"Estado","Tipo","resultado"
];

let html="<tr>";
cols.forEach(c=>html+=`<th>${c}</th>`);
html+="</tr>";

data.slice(0,150).forEach(f=>{
html+="<tr>";
cols.forEach(c=>{
html+=`<td>${f[c]||""}</td>`;
});
html+="</tr>";
});

document.getElementById("tabla").innerHTML=html;
}

function filtrar(){

let comuna=document.getElementById("filtro").value;
let texto=document.getElementById("buscar").value.toLowerCase();

let filtrado=datosGlobal.filter(x=>{

let ok1=!comuna || x["Comuna"]==comuna;
let fila=Object.values(x).join(" ").toLowerCase();
let ok2=fila.includes(texto);

return ok1 && ok2;

});

tabla(filtrado);
}
</script>

</body>
</html>
